<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control</title>
    <!-- Google Font — same as the dashboard -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Supabase — talks to the cloud database -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        /* === Princess theme matching the dashboard === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lexend', sans-serif;
            background: #1a1216;
            color: #d4ccc8;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: #2a1f24;
            border: 1px solid #3d2f35;
            border-radius: 16px;
            padding: 40px 30px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 30px rgba(212, 132, 154, 0.1);
        }

        .crown { font-size: 48px; margin-bottom: 10px; display: inline-block; transform: rotate(-15deg); }
        h1 { color: #f0e6ea; font-size: 22px; font-weight: 500; margin-bottom: 8px; }
        .subtitle { color: #b48db5; font-size: 14px; margin-bottom: 30px; }

        /* Inputs */
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 13px; color: #b48db5; margin-bottom: 6px; }
        .input-group input {
            width: 100%;
            padding: 12px 14px;
            background: #1a1216;
            border: 1px solid #3d2f35;
            border-radius: 8px;
            color: #f0e6ea;
            font-family: 'Lexend', sans-serif;
            font-size: 15px;
            outline: none;
        }
        .input-group input:focus { border-color: #d4849a; }
        .input-group input::placeholder { color: #6b5a62; }

        /* Code input — big centered numbers */
        #code {
            text-align: center;
            font-size: 24px;
            letter-spacing: 8px;
            font-weight: 600;
        }

        /* Big button */
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4849a, #b48db5);
            border: none;
            border-radius: 10px;
            color: #1a1216;
            font-family: 'Lexend', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary {
            background: #3d2f35;
            color: #d4ccc8;
        }

        /* Status messages */
        .msg {
            font-size: 13px;
            min-height: 20px;
            margin-bottom: 10px;
        }
        .msg.error { color: #e88b8b; }
        .msg.success { color: #8bd4a0; }
        .msg.info { color: #b48db5; }

        /* Skip link */
        .skip {
            font-size: 12px;
            color: #6b5a62;
            text-decoration: none;
            display: block;
            margin-top: 15px;
        }
        .skip:hover { color: #b48db5; }
    </style>
</head>
<body>
    <div class="login-box">
        <!-- Crown -->
        <div class="crown">&#128081;</div>
        <h1>Mission Control</h1>

        <!-- Status message area -->
        <div id="msg" class="msg"></div>

        <!-- STEP 1: Enter email -->
        <div id="step-email">
            <p class="subtitle">Enter your email to get a login code.<br>No password needed — ever.</p>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
            </div>
            <button class="btn" id="send-btn" onclick="sendCode()">Send Code</button>
        </div>

        <!-- STEP 2: Enter the 6-digit code -->
        <div id="step-code" style="display:none;">
            <p class="subtitle">Check your email for a 6-digit code.<br>Type it here.</p>
            <div class="input-group">
                <label for="code">Code</label>
                <input type="text" id="code" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
            </div>
            <button class="btn" id="verify-btn" onclick="verifyCode()">Let Me In</button>
            <button class="btn btn-secondary" onclick="showEmailStep()">Use a different email</button>
        </div>

        <!-- Skip login — use without cloud sync -->
        <a href="index.html" class="skip">Skip — use without cloud sync</a>
    </div>

    <script>
        // Store the email between steps
        let userEmail = '';

        // Check if already logged in — if so, go straight to the app
        (async function checkAuth() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    window.location.href = 'index.html';
                }
            } catch (e) {
                // Not logged in, show the form
            }
        })();

        // STEP 1: Send a 6-digit code to their email
        async function sendCode() {
            const email = document.getElementById('email').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('send-btn');

            if (!email || !email.includes('@')) {
                msg.className = 'msg error';
                msg.textContent = 'Enter a valid email address.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending...';
            msg.className = 'msg info';
            msg.textContent = 'Sending code...';

            try {
                // signInWithOtp WITHOUT a redirectTo sends a 6-digit code instead of a link
                const { error } = await supabaseClient.auth.signInWithOtp({
                    email: email
                });

                if (error) throw error;

                // Save email for step 2
                userEmail = email;

                // Show code entry step
                document.getElementById('step-email').style.display = 'none';
                document.getElementById('step-code').style.display = 'block';
                msg.className = 'msg success';
                msg.textContent = 'Code sent to ' + email;

                // Auto-focus the code input
                document.getElementById('code').focus();

            } catch (err) {
                msg.className = 'msg error';
                msg.textContent = err.message || 'Something went wrong. Try again.';
                btn.disabled = false;
                btn.textContent = 'Send Code';
            }
        }

        // STEP 2: Verify the 6-digit code
        async function verifyCode() {
            const code = document.getElementById('code').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('verify-btn');

            if (!code || code.length !== 6) {
                msg.className = 'msg error';
                msg.textContent = 'Enter the 6-digit code from your email.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Checking...';
            msg.className = 'msg info';
            msg.textContent = 'Verifying...';

            try {
                // Verify the OTP code with Supabase
                const { data, error } = await supabaseClient.auth.verifyOtp({
                    email: userEmail,
                    token: code,
                    type: 'email'
                });

                if (error) throw error;

                // Success! Logged in. Go to dashboard.
                msg.className = 'msg success';
                msg.textContent = 'You\'re in!';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 500);

            } catch (err) {
                msg.className = 'msg error';
                msg.textContent = err.message || 'Wrong code. Try again.';
                btn.disabled = false;
                btn.textContent = 'Let Me In';
                document.getElementById('code').value = '';
                document.getElementById('code').focus();
            }
        }

        // Go back to email step
        function showEmailStep() {
            document.getElementById('step-email').style.display = 'block';
            document.getElementById('step-code').style.display = 'none';
            document.getElementById('msg').textContent = '';
            document.getElementById('send-btn').disabled = false;
            document.getElementById('send-btn').textContent = 'Send Code';
        }

        // Enter key submits on both steps
        document.getElementById('email').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendCode();
        });
        document.getElementById('code').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') verifyCode();
        });
    </script>
</body>
</html>
