<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control</title>
    <!-- Google Font — same as the dashboard -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Supabase — talks to the cloud database -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        /* === Princess theme matching the dashboard === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lexend', sans-serif;
            background: #1a1216;
            color: #d4ccc8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: #2a1f24;
            border: 1px solid #3d2f35;
            border-radius: 16px;
            padding: 40px 30px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 30px rgba(212, 132, 154, 0.1);
        }

        .crown { font-size: 48px; margin-bottom: 10px; display: inline-block; transform: rotate(-15deg); }
        h1 { color: #f0e6ea; font-size: 22px; font-weight: 500; margin-bottom: 8px; }
        .subtitle { color: #b48db5; font-size: 14px; margin-bottom: 30px; }

        /* Email input */
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 13px; color: #b48db5; margin-bottom: 6px; }
        .input-group input {
            width: 100%;
            padding: 12px 14px;
            background: #1a1216;
            border: 1px solid #3d2f35;
            border-radius: 8px;
            color: #f0e6ea;
            font-family: 'Lexend', sans-serif;
            font-size: 15px;
            outline: none;
        }
        .input-group input:focus { border-color: #d4849a; }
        .input-group input::placeholder { color: #6b5a62; }

        /* Big button */
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4849a, #b48db5);
            border: none;
            border-radius: 10px;
            color: #1a1216;
            font-family: 'Lexend', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Status messages */
        .msg {
            font-size: 13px;
            min-height: 20px;
            margin-bottom: 10px;
        }
        .msg.error { color: #e88b8b; }
        .msg.success { color: #8bd4a0; }
        .msg.info { color: #b48db5; }

        /* Skip link */
        .skip {
            font-size: 12px;
            color: #6b5a62;
            text-decoration: none;
            display: block;
            margin-top: 15px;
        }
        .skip:hover { color: #b48db5; }
    </style>
</head>
<body>
    <div class="login-box">
        <!-- Crown -->
        <div class="crown">&#128081;</div>
        <h1>Mission Control</h1>
        <p class="subtitle">Enter your email to get a magic login link.<br>No password needed — ever.</p>

        <!-- Status message area -->
        <div id="msg" class="msg"></div>

        <!-- Email form -->
        <div id="login-form">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
            </div>
            <button class="btn" id="send-btn" onclick="sendMagicLink()">Send Magic Link</button>
        </div>

        <!-- Check email message (hidden until link is sent) -->
        <div id="check-email" style="display:none;">
            <p style="font-size: 15px; color: #f0e6ea; margin-bottom: 15px;">
                Check your email and click the link!
            </p>
            <p style="font-size: 13px; color: #b48db5;">
                It might take a minute. Check spam if you don't see it.
            </p>
            <button class="btn" style="margin-top: 20px; background: #3d2f35; color: #d4ccc8;" onclick="showForm()">Try again</button>
        </div>

        <!-- Skip login — use without cloud sync -->
        <a href="index.html" class="skip">Skip — use without cloud sync</a>
    </div>

    <script>
        // Check if already logged in — if so, go straight to the app
        (async function checkAuth() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    // Already logged in — skip to dashboard
                    window.location.href = 'index.html';
                }
            } catch (e) {
                // Not logged in, show the form — that's fine
            }
        })();

        // Send a magic link to the email address
        async function sendMagicLink() {
            const email = document.getElementById('email').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('send-btn');

            // Basic check
            if (!email || !email.includes('@')) {
                msg.className = 'msg error';
                msg.textContent = 'Enter a valid email address.';
                return;
            }

            // Disable button while sending
            btn.disabled = true;
            btn.textContent = 'Sending...';
            msg.className = 'msg info';
            msg.textContent = 'Sending magic link...';

            try {
                // This tells Supabase to email a login link
                // The redirectTo is where the link takes you after clicking
                const { error } = await supabaseClient.auth.signInWithOtp({
                    email: email,
                    options: {
                        emailRedirectTo: window.location.origin + window.location.pathname.replace('login.html', 'index.html')
                    }
                });

                if (error) throw error;

                // Success — show the "check your email" message
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('check-email').style.display = 'block';
                msg.className = 'msg success';
                msg.textContent = 'Magic link sent to ' + email;

            } catch (err) {
                msg.className = 'msg error';
                msg.textContent = err.message || 'Something went wrong. Try again.';
                btn.disabled = false;
                btn.textContent = 'Send Magic Link';
            }
        }

        // Show the email form again (if they want to retry)
        function showForm() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('check-email').style.display = 'none';
            document.getElementById('msg').textContent = '';
            document.getElementById('send-btn').disabled = false;
            document.getElementById('send-btn').textContent = 'Send Magic Link';
        }

        // Let them press Enter to submit
        document.getElementById('email').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMagicLink();
        });
    </script>
</body>
</html>
