<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control</title>

    <!-- PWA stuff -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1216">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <!-- Lexend font -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: #1a1216;
            color: #d4ccc8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .splash {
            text-align: center;
            z-index: 10;
        }

        .splash-crown {
            font-size: 72px;
            display: block;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 16px rgba(232, 184, 75, 0.5));
            animation: crown-float 3s ease-in-out infinite;
        }

        @keyframes crown-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .splash-title {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 3px;
            margin-bottom: 6px;
        }

        .splash-sub {
            font-size: 14px;
            color: #9a8a92;
            font-weight: 300;
            margin-bottom: 40px;
        }

        /* The magic wand button */
        .wand-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a1f24, #3d2f35);
            border: 2px solid #d4849a;
            font-size: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(212, 132, 154, 0.2);
            animation: wand-pulse 2s ease-in-out infinite;
        }

        @keyframes wand-pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(212, 132, 154, 0.2); }
            50% { box-shadow: 0 0 40px rgba(212, 132, 154, 0.5); }
        }

        .wand-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(212, 132, 154, 0.6);
        }

        .wand-btn:active {
            transform: scale(0.95);
        }

        .wand-hint {
            font-size: 13px;
            color: #6b5660;
            letter-spacing: 1px;
        }

        /* Status message */
        .splash-status {
            margin-top: 20px;
            font-size: 14px;
            color: #b48db5;
            min-height: 20px;
        }

        /* Sparkle particles */
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            animation: sparkle-fly var(--duration) ease-out forwards;
        }

        @keyframes sparkle-fly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) scale(0) rotate(360deg);
            }
        }

        /* Gate opening animation */
        .splash.opening .splash-crown {
            animation: crown-rise 1s ease-out forwards;
        }

        @keyframes crown-rise {
            to { transform: translateY(-30px) scale(1.3); filter: drop-shadow(0 8px 32px rgba(232, 184, 75, 0.8)); }
        }

        .splash.opening .splash-title {
            animation: title-glow 1s ease-out forwards;
        }

        @keyframes title-glow {
            to { color: #d4849a; text-shadow: 0 0 20px rgba(212, 132, 154, 0.5); }
        }

        .sparkle-deco {
            font-size: 12px;
            color: #6b5660;
            margin-top: 24px;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div class="splash" id="splash">
        <span class="splash-crown">👑</span>
        <h1 class="splash-title">MISSION CONTROL</h1>
        <p class="splash-sub">tap the wand to enter</p>

        <!-- The wand button -->
        <button class="wand-btn" id="wand-btn" onclick="enterTheCastle()">🪄</button>
        <div class="wand-hint">✨ bippity boppity boo ✨</div>

        <div class="splash-status" id="splash-status"></div>
        <div class="sparkle-deco">✦ · ✧ · ✦</div>
    </div>

    <script>
        // Check if already logged in — if so, skip splash and go straight in
        async function checkAuth() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    window.location.href = 'index.html';
                }
            } catch (e) {
                // Supabase not reachable — that's fine, they'll tap the wand
            }
        }
        checkAuth();

        // Sparkle explosion from the wand
        function burstSparkles(x, y) {
            const chars = ['✨','⭐','💫','🌟','🦋','💖','💜','🔮','👑','🌙'];
            const colors = ['#d4849a', '#e8b84b', '#ffffff', '#b48db5', '#f0c4d4'];

            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const spark = document.createElement('div');
                    spark.className = 'sparkle';
                    spark.textContent = chars[Math.floor(Math.random() * chars.length)];
                    spark.style.left = x + 'px';
                    spark.style.top = y + 'px';
                    spark.style.fontSize = (14 + Math.random() * 24) + 'px';
                    spark.style.color = colors[Math.floor(Math.random() * colors.length)];

                    // Random direction — burst outward in all directions
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 80 + Math.random() * 200;
                    spark.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                    spark.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                    spark.style.setProperty('--duration', (0.6 + Math.random() * 0.8) + 's');

                    document.body.appendChild(spark);
                    setTimeout(() => spark.remove(), 1500);
                }, i * 25);
            }
        }

        // The main entrance function
        async function enterTheCastle() {
            const btn = document.getElementById('wand-btn');
            const status = document.getElementById('splash-status');
            const splash = document.getElementById('splash');

            // Get wand position for sparkle burst
            const rect = btn.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            // Sparkle explosion!
            burstSparkles(cx, cy);

            // Start the opening animation
            splash.classList.add('opening');
            btn.style.pointerEvents = 'none';
            status.textContent = 'opening the gates...';

            // Try to sign in silently (if there's a session or we can create one)
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    // Already have a session — go right in
                    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
                    return;
                }

                // No session — try anonymous sign-in
                const { error } = await supabaseClient.auth.signInAnonymously();
                if (!error) {
                    // Anonymous auth worked — go in with cloud sync
                    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
                    return;
                }
            } catch (e) {
                // Auth failed — that's OK
            }

            // If all auth fails, just go in anyway (localStorage mode)
            // The app still works, just no cloud sync between devices
            setTimeout(() => { window.location.href = 'index.html'; }, 1200);
        }
    </script>

    <!-- Register the service worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service worker registered'))
                .catch(err => console.log('Service worker registration failed:', err));
        }
    </script>

</body>
</html>
